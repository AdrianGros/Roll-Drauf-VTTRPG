name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
      image_tag:
        description: "Container image tag"
        required: true
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate deploy metadata
      run: |
        echo "Deploy environment: ${{ inputs.environment }}"
        echo "Deploy image tag: ${{ inputs.image_tag }}"

    - name: Placeholder deploy command
      run: |
        echo "Replace with your platform deploy command (Terraform/Helm/SSH script)."
        echo "Expected flow: pull image tag -> run migrations -> restart app -> smoke check."

    - name: Post-deploy smoke checks
      run: |
        echo "Replace with curl checks to /health/live and /health/ready in target env."
