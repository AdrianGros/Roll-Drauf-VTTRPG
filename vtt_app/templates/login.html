<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - roll drauf vtt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--vtt-font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: var(--vtt-surface-card, #201530);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,175,55,0.15);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: var(--vtt-accent);
            margin-bottom: 30px;
            font-size: 28px;
            font-family: var(--vtt-font-heading);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: var(--vtt-text-secondary);
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 10px;
            background: var(--vtt-surface-input);
            color: var(--vtt-text-primary);
            border: 1px solid var(--vtt-border-subtle);
            border-radius: 5px;
            font-size: 14px;
            font-family: var(--vtt-font-body);
        }
        input:focus {
            outline: none;
            border-color: var(--vtt-border-focus);
            background: var(--vtt-surface-input);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.25);
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--vtt-primary);
            color: var(--vtt-text-primary);
            border: 1px solid var(--vtt-accent);
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            font-family: var(--vtt-font-heading);
            letter-spacing: 0.5px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        button:hover {
            background: var(--vtt-accent);
            color: var(--vtt-primary);
        }
        .error {
            color: var(--vtt-text-error);
            font-size: 14px;
            margin-top: 5px;
        }
        .mfa-input {
            display: none;
        }
        .link {
            text-align: center;
            margin-top: 20px;
            color: var(--vtt-text-secondary);
        }
        .link a {
            color: var(--vtt-accent);
            text-decoration: none;
            transition: all 0.3s;
        }
        .link a:hover {
            text-decoration: underline;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: var(--vtt-text-secondary);
        }
    </style>
    <!-- Spellbook Theme -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/spellbook-theme.css">
</head>
<body class="spellbook">
    <div class="login-container">
        <h1>roll drauf vtt</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                <div class="error" id="usernameError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
                <div class="error" id="passwordError"></div>
            </div>

            <div class="form-group mfa-input" id="mfaGroup">
                <label for="mfa">MFA Code (6 digits)</label>
                <input type="text" id="mfa" name="mfa" placeholder="000000" maxlength="6">
                <div class="error" id="mfaError"></div>
            </div>

            <button type="submit">Login</button>
            <div class="loading" id="loading">Logging in...</div>
            <div class="error" id="generalError"></div>
        </form>

        <div class="link">
            Don't have an account? <a href="/signup.html">Sign up</a>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            Auth.redirectIfAuthenticated('/dashboard');
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const mfa = document.getElementById('mfa').value;

            clearErrors();
            showLoading(true);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, otp: mfa })
                });

                const data = await response.json();

                if (response.status === 401 && data.mfa_required) {
                    // MFA required
                    document.getElementById('mfaGroup').style.display = 'block';
                    showError('generalError', 'Enter your MFA code');
                    return;
                }

                if (!response.ok) {
                    showError('generalError', data.error || 'Login failed');
                    return;
                }

                // Success
                window.location.href = '/dashboard';

            } catch (error) {
                showError('generalError', 'Network error: ' + error.message);
            } finally {
                showLoading(false);
            }
        });

        function clearErrors() {
            document.getElementById('usernameError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('mfaError').textContent = '';
            document.getElementById('generalError').textContent = '';
        }

        function showError(elementId, message) {
            document.getElementById(elementId).textContent = message;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
