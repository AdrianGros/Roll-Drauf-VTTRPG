<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - roll drauf vtt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--vtt-font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Book-integrated login form */
        #login-content {
            position: fixed;
            inset: 0;
            z-index: 9001;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
        }

        #login-content.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .login-book-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .login-book-content {
            background: linear-gradient(to right, #f5e6d3 0%, #e8d5b7 50%, #f5e6d3 100%);
            border-radius: 0 10px 10px 0;
            padding: 60px 50px;
            box-shadow: inset -5px 0 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            position: relative;
            z-index: 9001;
            width: 550px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .book-branding {
            font-family: 'BadScript', cursive;
            color: #d4af37;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
        }

        .book-subtitle {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .book-ornament {
            font-size: 50px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
        }

        .book-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            width: 100%;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(32, 21, 48, 0.15);
            color: #4a235a;
            border: 2px solid #8a6b8a;
            border-radius: 6px;
            font-size: 15px;
            font-family: var(--vtt-font-body);
            transition: all 0.3s;
        }

        input::placeholder {
            color: #8a6b8a;
            font-style: italic;
        }

        input:focus {
            outline: none;
            border-color: #d4af37;
            background: rgba(32, 21, 48, 0.25);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .book-login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4a235a 0%, #5a2e6a 100%);
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            font-family: var(--vtt-font-heading);
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .book-login-btn:hover {
            background: linear-gradient(135deg, #5a2e6a 0%, #6a3e7a 100%);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        .error {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 5px;
            text-align: center;
        }

        .mfa-input {
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #4a235a;
            font-size: 14px;
        }

        .book-link {
            text-align: center;
            margin-top: 15px;
            color: #4a235a;
            font-size: 14px;
        }

        .book-link a {
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .book-link a:hover {
            text-decoration: underline;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        /* Fallback for old .login-container if needed */
        .login-container {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-book-content {
                width: 90%;
                max-width: 400px;
                padding: 40px 35px;
                gap: 20px;
            }

            .book-branding {
                font-size: 28px;
            }

            .book-subtitle {
                font-size: 22px;
            }

            .book-ornament {
                font-size: 40px;
            }
        }

        @media (max-width: 480px) {
            .login-book-content {
                width: 90%;
                max-width: 300px;
                padding: 30px 25px;
                gap: 15px;
            }

            .book-branding {
                font-size: 24px;
            }

            .book-subtitle {
                font-size: 18px;
            }

            .book-ornament {
                font-size: 32px;
            }

            input {
                padding: 10px 14px;
                font-size: 14px;
            }
        }
    </style>
    <!-- Spellbook Theme -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/spellbook-theme.css">
    <link rel="stylesheet" href="/static/css/book-scene.css">
    <link rel="stylesheet" href="/static/css/components.css">
</head>
<body class="spellbook">
    <!-- 3D Book Scene (injected via book-scene.js) -->

    <!-- Login content (fades in after book opens) -->
    <div id="login-content">
        <div class="login-book-wrapper">
            <div class="login-book-content">
                <div class="book-branding">roll drauf</div>
                <div class="book-subtitle">Spellbook</div>
                <div class="book-ornament">✨</div>

                <form id="loginForm" class="book-form" role="form" aria-label="Login form">
                    <div class="form-group">
                        <label for="username" class="form-label">Benutzername</label>
                        <input type="text" id="username" name="username" placeholder="Benutzername" required
                               aria-required="true" aria-describedby="usernameError">
                        <div class="error" id="usernameError" role="alert" aria-live="polite"></div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Passwort</label>
                        <input type="password" id="password" name="password" placeholder="Passwort" required
                               aria-required="true" aria-describedby="passwordError">
                        <div class="error" id="passwordError" role="alert" aria-live="polite"></div>
                    </div>

                    <div class="form-group mfa-input" id="mfaGroup">
                        <label for="mfa" class="form-label">MFA Code</label>
                        <input type="text" id="mfa" name="mfa" placeholder="000000" maxlength="6"
                               aria-describedby="mfaError">
                        <div class="error" id="mfaError" role="alert" aria-live="polite"></div>
                    </div>

                    <button type="submit" class="book-login-btn" aria-label="Enter spellbook - submit login form">Enter</button>
                    <div class="loading" id="loading" role="status" aria-live="polite">Logging in...</div>
                    <div class="error" id="generalError" role="alert" aria-live="assertive"></div>
                </form>

                <div class="book-link">
                    Don't have an account? <a href="/signup.html">Sign up</a>
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP loaded locally to ensure reliable loading -->
    <script src="/static/js/gsap.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/book-scene.js"></script>

    <script>
        // Wait for BOTH DOMContentLoaded AND window.load to ensure GSAP is loaded
        function initBook() {
            console.log('[Login] Initializing book');

            if (typeof gsap === 'undefined') {
                console.warn('[Login] GSAP still not available, retrying in 200ms...');
                setTimeout(initBook, 200);
                return;
            }

            console.log('[Login] ✓ GSAP is available');

            // Create and open book
            BookScene.create();
            BookScene.open();

            // Auth check (non-blocking)
            Auth.redirectIfAuthenticated('/dashboard');
        }

        // Try on DOMContentLoaded
        document.addEventListener('DOMContentLoaded', () => {
            console.log('[Login] DOMContentLoaded fired');
            setTimeout(initBook, 100);
        });

        // Also try on window load (backup)
        window.addEventListener('load', () => {
            console.log('[Login] window.load fired');
            setTimeout(initBook, 100);
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const mfa = document.getElementById('mfa').value;

            clearErrors();
            showLoading(true);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, otp: mfa })
                });

                const data = await response.json();

                if (response.status === 401 && data.mfa_required) {
                    // MFA required
                    document.getElementById('mfaGroup').style.display = 'block';
                    showError('generalError', 'Enter your MFA code');
                    return;
                }

                if (!response.ok) {
                    showError('generalError', data.error || 'Login failed');
                    return;
                }

                // Success - use page turn animation
                BookScene.pageTurn('/dashboard');

            } catch (error) {
                showError('generalError', 'Network error: ' + error.message);
            } finally {
                showLoading(false);
            }
        });

        function clearErrors() {
            document.getElementById('usernameError').textContent = '';
            document.getElementById('passwordError').textContent = '';
            document.getElementById('mfaError').textContent = '';
            document.getElementById('generalError').textContent = '';
        }

        function showError(elementId, message) {
            document.getElementById(elementId).textContent = message;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
