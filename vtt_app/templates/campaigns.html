<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTT - Campaigns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(0,0,0,0.3);
            padding: 1rem 2rem;
            border-bottom: 2px solid #4a9eff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4a9eff;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #4a9eff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #357bcc;
        }

        .btn-secondary {
            background: #666;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #777;
        }

        .btn-danger {
            background: #d74a4a;
            color: #fff;
            font-size: 0.8rem;
        }

        .btn-danger:hover {
            background: #bd3636;
        }

        .btn-sm {
            padding: 0.35rem 0.7rem;
            font-size: 0.8rem;
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .page-header h1 {
            font-size: 2rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #444;
        }

        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            background: none;
            border: none;
            color: #a0a0a0;
            font-size: 1rem;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: #4a9eff;
            border-bottom-color: #4a9eff;
        }

        .message {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 4px;
            display: none;
        }

        .message.success {
            display: block;
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid rgba(76, 175, 80, 0.6);
            color: #9be7a0;
        }

        .message.error {
            display: block;
            background: rgba(215, 74, 74, 0.2);
            border: 1px solid rgba(215, 74, 74, 0.6);
            color: #ff9e9e;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .campaign-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.2s;
        }

        .campaign-card:hover {
            border-color: #4a9eff;
            box-shadow: 0 0 15px rgba(74, 158, 255, 0.2);
            transform: translateY(-2px);
        }

        .campaign-banner {
            width: 100%;
            height: 100px;
            background: linear-gradient(135deg, #4a9eff 0%, #2d5a8c 100%);
            border-bottom: 1px solid #444;
        }

        .campaign-info {
            padding: 1rem;
        }

        .campaign-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .campaign-status {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 0.75rem;
            text-transform: capitalize;
        }

        .status-active {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
        }

        .status-paused,
        .status-archived {
            background: rgba(158, 158, 158, 0.2);
            color: #bdbdbd;
        }

        .campaign-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin: 0.75rem 0;
            font-size: 0.85rem;
        }

        .meta-item {
            background: rgba(74, 158, 255, 0.1);
            padding: 0.4rem;
            border-radius: 3px;
            text-align: center;
        }

        .meta-label {
            color: #a0a0a0;
            font-size: 0.75rem;
        }

        .meta-value {
            color: #4a9eff;
            font-weight: bold;
        }

        .campaign-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .campaign-actions button {
            flex: 1;
            padding: 0.4rem;
            font-size: 0.8rem;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #a0a0a0;
            background: rgba(0,0,0,0.2);
            border: 1px dashed #555;
            border-radius: 6px;
        }

        .detail-panel {
            margin-top: 1.5rem;
            background: rgba(0,0,0,0.35);
            border: 1px solid #4a9eff;
            border-radius: 6px;
            padding: 1rem;
        }

        .detail-panel.hidden {
            display: none;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .detail-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .hub-shell {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .hub-hero {
            display: grid;
            grid-template-columns: minmax(0, 1.45fr) minmax(320px, 1fr);
            gap: 1rem;
            padding: 1rem;
            border-radius: 10px;
            border: 1px solid rgba(93, 171, 255, 0.45);
            background: linear-gradient(135deg, rgba(26, 48, 72, 0.82), rgba(12, 18, 30, 0.9));
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
        }

        .hub-identity h2 {
            margin-bottom: 0.4rem;
            font-size: 1.6rem;
            color: #f0f6ff;
        }

        .hub-eyebrow {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #9dc9ff;
            margin-bottom: 0.35rem;
        }

        .hub-summary {
            margin-top: 0.55rem;
            color: #d7e7ff;
            line-height: 1.45;
            max-width: 62ch;
        }

        .hub-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.75rem;
        }

        .hub-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.32rem 0.65rem;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #eaf2ff;
            font-size: 0.82rem;
            white-space: nowrap;
        }

        .hub-primary {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 0.75rem;
            border-radius: 8px;
            padding: 0.95rem;
            background: rgba(0, 0, 0, 0.24);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .hub-next-label {
            font-size: 0.74rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #9dc9ff;
            margin-bottom: 0.25rem;
        }

        .hub-next-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.35rem;
        }

        .hub-next-hint {
            color: #bfd4f4;
            line-height: 1.45;
        }

        .hub-primary-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.7rem;
        }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .hub-card {
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 0.9rem;
        }

        .hub-card h3 {
            margin-bottom: 0.7rem;
            color: #4a9eff;
            font-size: 1rem;
        }

        .hub-card-topline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .hub-stat-row {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .hub-stat {
            padding: 0.55rem;
            border-radius: 6px;
            background: rgba(74, 158, 255, 0.08);
            border: 1px solid rgba(74, 158, 255, 0.18);
        }

        .hub-stat-label {
            color: #a9c7ef;
            font-size: 0.75rem;
            margin-bottom: 0.2rem;
        }

        .hub-stat-value {
            color: #f3f8ff;
            font-weight: 700;
        }

        .hub-step-list {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .hub-step {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 0.6rem;
            background: rgba(0, 0, 0, 0.18);
        }

        .hub-step-title {
            font-weight: 600;
            color: #f0f6ff;
            margin-bottom: 0.18rem;
        }

        .hub-step-desc {
            font-size: 0.82rem;
            color: #b9d0ef;
            line-height: 1.35;
        }

        .hub-step-state {
            flex: 0 0 auto;
            border-radius: 999px;
            padding: 0.2rem 0.65rem;
            font-size: 0.75rem;
            white-space: nowrap;
            margin-top: 0.08rem;
        }

        .hub-step-state.state-done {
            background: rgba(76, 175, 80, 0.22);
            color: #9be7a0;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .hub-step-state.state-todo {
            background: rgba(255, 193, 7, 0.18);
            color: #ffe08a;
            border: 1px solid rgba(255, 193, 7, 0.45);
        }

        .hub-step-state.state-live {
            background: rgba(74, 158, 255, 0.18);
            color: #9dc9ff;
            border: 1px solid rgba(74, 158, 255, 0.45);
        }

        .hub-map-list,
        .hub-session-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .hub-map-item {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 0.6rem;
            background: rgba(0, 0, 0, 0.18);
        }

        .hub-map-title {
            font-weight: 600;
            color: #f0f6ff;
            margin-bottom: 0.2rem;
        }

        .hub-map-meta,
        .hub-session-meta {
            font-size: 0.8rem;
            color: #b9d0ef;
            line-height: 1.35;
        }

        .hub-pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .hub-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.28rem 0.6rem;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #dfe9f7;
            font-size: 0.78rem;
        }

        .hub-callout {
            margin-top: 0.75rem;
            padding: 0.7rem 0.85rem;
            border-radius: 6px;
            background: rgba(74, 158, 255, 0.08);
            border: 1px solid rgba(74, 158, 255, 0.22);
            color: #d9e8fb;
            line-height: 1.4;
        }

        .asset-library-toolbar,
        .asset-library-upload {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 0.6rem;
            margin-top: 0.7rem;
        }

        .asset-library-toolbar input,
        .asset-library-toolbar select,
        .asset-library-upload input,
        .asset-library-upload select {
            width: 100%;
            background: #1a1a24;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 0.45rem 0.55rem;
            min-height: 40px;
        }

        .asset-library-upload {
            padding: 0.85rem;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 0.8rem;
        }

        .asset-library-upload .upload-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .asset-library-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.75rem;
        }

        .asset-library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.85rem;
            margin-top: 0.85rem;
        }

        .asset-card {
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.22);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
            min-height: 280px;
        }

        .asset-preview {
            position: relative;
            width: 100%;
            height: 150px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(74, 158, 255, 0.16), rgba(0, 0, 0, 0.35));
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .asset-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .asset-preview-placeholder {
            font-size: 2rem;
            color: #d9e8fb;
            text-align: center;
            padding: 0.5rem;
            line-height: 1.2;
        }

        .asset-preview-label {
            font-size: 0.8rem;
            color: #d9e8fb;
            text-align: center;
            padding: 0.35rem 0.65rem;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(0, 0, 0, 0.22);
        }

        .asset-card-body {
            padding: 0.8rem;
            display: flex;
            flex: 1;
            flex-direction: column;
            gap: 0.35rem;
        }

        .asset-card-title {
            font-weight: 700;
            color: #f0f6ff;
            word-break: break-word;
        }

        .asset-card-meta {
            font-size: 0.8rem;
            color: #b9d0ef;
            line-height: 1.35;
        }

        .asset-card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: auto;
            padding-top: 0.5rem;
        }

        .asset-card-actions .btn {
            flex: 1 1 auto;
        }

        .asset-empty-state {
            padding: 1rem;
            border-radius: 8px;
            border: 1px dashed rgba(255, 255, 255, 0.15);
            color: #b9d0ef;
            text-align: center;
            background: rgba(0, 0, 0, 0.18);
        }

        .hub-quickstart {
            margin-top: 0.7rem;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid rgba(74, 158, 255, 0.4);
            background: rgba(74, 158, 255, 0.08);
        }

        .hub-quickstart .quickstart-title {
            margin-bottom: 0.25rem;
        }

        .hub-quickstart .quickstart-help {
            margin-bottom: 0.55rem;
        }

        .detail-box {
            background: rgba(0,0,0,0.25);
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.75rem;
        }

        .detail-box h3 {
            margin-bottom: 0.75rem;
            color: #4a9eff;
            font-size: 1rem;
        }

        .workflow-copy-box {
            margin-top: 1rem;
            border: 1px solid rgba(93, 171, 255, 0.45);
            border-radius: 6px;
            padding: 0.85rem;
            background: rgba(26, 48, 72, 0.35);
        }

        .workflow-copy-title {
            color: #9dc9ff;
            font-weight: 700;
            margin-bottom: 0.45rem;
        }

        .workflow-copy-note {
            color: #c8ddff;
            font-size: 0.82rem;
            margin-bottom: 0.7rem;
        }

        .workflow-step {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            padding: 0.55rem;
            margin-bottom: 0.45rem;
            background: rgba(0, 0, 0, 0.22);
            font-size: 0.9rem;
        }

        .workflow-step:last-child {
            margin-bottom: 0;
        }

        .workflow-state {
            font-size: 0.78rem;
            border-radius: 999px;
            padding: 0.15rem 0.55rem;
            white-space: nowrap;
        }

        .state-done {
            background: rgba(76, 175, 80, 0.22);
            color: #9be7a0;
            border: 1px solid rgba(76, 175, 80, 0.5);
        }

        .state-todo {
            background: rgba(255, 193, 7, 0.18);
            color: #ffe08a;
            border: 1px solid rgba(255, 193, 7, 0.45);
        }

        .list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .list-item {
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.6rem;
            background: rgba(0,0,0,0.25);
        }

        .list-item-top {
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }

        .muted {
            color: #a0a0a0;
            font-size: 0.85rem;
        }

        .inline-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .inline-controls input,
        .inline-controls select {
            background: #1a1a24;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 0.45rem 0.55rem;
            min-width: 160px;
        }

        .quickstart-panel {
            margin-top: 0.85rem;
            border: 1px solid rgba(74, 158, 255, 0.4);
            background: rgba(74, 158, 255, 0.08);
            border-radius: 6px;
            padding: 0.75rem;
        }

        .quickstart-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #9dc9ff;
            margin-bottom: 0.3rem;
        }

        .quickstart-help {
            font-size: 0.82rem;
            color: #bed9ff;
            margin-bottom: 0.55rem;
        }

        .community-shell {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1rem;
        }

        .chat-feed {
            min-height: 220px;
            max-height: 320px;
            overflow: auto;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.6rem;
            background: rgba(0,0,0,0.2);
        }

        .chat-item {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0.45rem 0;
            font-size: 0.9rem;
        }

        .chat-item:last-child {
            border-bottom: none;
        }

        .chat-item-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
        }

        .chat-actions {
            display: flex;
            gap: 0.35rem;
            flex-wrap: wrap;
        }

        .chat-input-row {
            margin-top: 0.65rem;
            display: flex;
            gap: 0.5rem;
        }

        .chat-input-row input {
            flex: 1;
            background: #1a1a24;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 0.45rem 0.55rem;
        }

        .mod-queue {
            min-height: 220px;
            max-height: 320px;
            overflow: auto;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 0.6rem;
            background: rgba(0,0,0,0.2);
            font-size: 0.85rem;
        }

        .mod-item {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0.4rem 0;
        }

        .mod-item:last-child {
            border-bottom: none;
        }

        footer {
            background: rgba(0,0,0,0.3);
            padding: 1rem 2rem;
            border-top: 1px solid #444;
            text-align: center;
            color: #666;
            font-size: 0.85rem;
        }

        @media (max-width: 900px) {
            main {
                padding: 1rem;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .detail-columns {
                grid-template-columns: 1fr;
            }

            .hub-hero,
            .hub-grid {
                grid-template-columns: 1fr;
            }

            .community-shell {
                grid-template-columns: 1fr;
            }
        }

        /* Dark mode surface styling */
        .card, .campaign-card, .empty-state {
            background: var(--vtt-surface-card, #201530) !important;
            border: 1px solid rgba(212, 175, 55, 0.15) !important;
            color: var(--vtt-text-primary, #e8d5b7);
        }
        .card-title { color: var(--vtt-accent); }
        .card-meta, .campaign-info, .empty-state p { color: var(--vtt-text-secondary, #9e8fa0); }
        input, textarea, select {
            background: var(--vtt-surface-input, #141420) !important;
            color: var(--vtt-text-primary, #e8d5b7) !important;
            border-color: var(--vtt-border-subtle, rgba(255,255,255,0.10)) !important;
        }
        input::placeholder { color: rgba(232, 213, 183, 0.5); }
    </style>
    <!-- Spellbook Theme -->
    <link rel="stylesheet" href="/static/css/fonts.css">
    <link rel="stylesheet" href="/static/css/spellbook-theme.css">
    <link rel="stylesheet" href="/static/css/book-scene.css">
</head>
<body class="spellbook">
    <header>
        <div class="logo">roll drauf VTT</div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="goTo('/dashboard')">Cockpit</button>
            <button class="btn btn-secondary" onclick="goTo('/characters')">Charaktere</button>
            <button class="btn btn-secondary" onclick="logout()">Abmelden</button>
        </div>
    </header>

    <main>
        <div class="page-header">
            <h1>Kampagnen</h1>
            <button class="btn btn-primary" onclick="createCampaign()">+ Neue Kampagne</button>
        </div>

        <div id="messageBox" class="message"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('my', this)">Meine Kampagnen</button>
            <button class="tab" onclick="switchTab('joined', this)">Beigetreten</button>
            <button class="tab" onclick="switchTab('browse', this)">Alle</button>
        </div>

        <div class="grid" id="campaignsGrid">
            <div class="empty-state">
                        <p>Kampagnen werden geladen...</p>
            </div>
        </div>

        <section class="detail-panel hidden" id="campaignDetail">
            <div class="detail-header">
                <h2 id="detailTitle">Kampagnen-Details</h2>
                <div style="display:flex; gap:0.5rem;">
                    <button class="btn btn-secondary btn-sm" id="refreshDetailBtn">Refresh</button>
                    <button class="btn btn-secondary btn-sm" onclick="closeCampaignDetail()">Schliessen</button>
                </div>
            </div>
            <div id="detailBody"></div>
        </section>
    </main>

    <footer>
        <p>roll drauf VTT - D&D Virtual Tabletop for Discord | v1.0</p>
    </footer>

    <script src="/static/js/gsap.min.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/community.js"></script>
    <script src="/static/js/book-scene.js"></script>
    <script>
        const auth = new Auth();
        const community = new CommunityClient(auth);
        let campaigns = [];
        let currentTab = "my";
        let selectedCampaignId = null;
        let currentUser = null;
        let currentDetailCampaign = null;

        function showMessage(text, isError = false) {
            const box = document.getElementById("messageBox");
            box.className = `message ${isError ? "error" : "success"}`;
            box.textContent = text;
            window.setTimeout(() => {
                box.className = "message";
                box.textContent = "";
            }, 3500);
        }

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatDate(value) {
            if (!value) return "-";
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return date.toLocaleString();
        }

        function updateUrlCampaignId(campaignId) {
            const url = new URL(window.location.href);
            if (campaignId) {
                url.searchParams.set("campaign_id", campaignId);
            } else {
                url.searchParams.delete("campaign_id");
            }
            window.history.replaceState({}, "", url.toString());
        }

        async function loadCampaigns() {
            try {
                currentUser = await auth.requireAuth("/login.html");
                if (!currentUser) return;

                campaigns = await auth.makeAuthRequest("/api/campaigns");
                const activeTabButton = document.querySelector(".tab.active");
                switchTab(currentTab, activeTabButton);

                const queryCampaignId = Number(new URLSearchParams(window.location.search).get("campaign_id"));
                if (Number.isInteger(queryCampaignId) && queryCampaignId > 0) {
                    await viewCampaign(queryCampaignId, false);
                }
            } catch (error) {
                document.getElementById("campaignsGrid").innerHTML = `
                    <div class="empty-state">
                        <p>Kampagnen konnten nicht geladen werden.</p>
                    </div>
                `;
                showMessage(error.message || "Kampagnen konnten nicht geladen werden.", true);
            }
        }

        function switchTab(tab, element) {
            currentTab = tab;
            document.querySelectorAll(".tab").forEach(tabButton => tabButton.classList.remove("active"));
            if (element) {
                element.classList.add("active");
            } else {
                const fallback = document.querySelector(`.tab[onclick*="'${tab}'"]`);
                if (fallback) fallback.classList.add("active");
            }

            let filtered = campaigns;
            if (tab === "my") {
                filtered = campaigns.filter(campaign => campaign.is_owner);
            } else if (tab === "joined") {
                filtered = campaigns.filter(campaign => campaign.is_member && !campaign.is_owner);
            }

            renderCampaigns(filtered);
        }

        function renderCampaigns(campaignList) {
            const grid = document.getElementById("campaignsGrid");
            if (!campaignList || campaignList.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <p>In diesem Bereich gibt es noch keine Kampagnen.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = campaignList.map(campaign => {
                const statusClass = `status-${campaign.status}`;
                const primaryAction = campaign.is_member
                    ? `<button class="btn btn-primary" onclick="viewCampaign(${campaign.id})">Oeffnen</button>`
                    : `<button class="btn btn-primary" onclick="joinCampaign(${campaign.id})">Beitreten</button>`;

                return `
                    <div class="campaign-card">
                        <div class="campaign-banner"></div>
                        <div class="campaign-info">
                            <div class="campaign-name">${escapeHtml(campaign.name)}</div>
                            <div class="campaign-status ${statusClass}">${escapeHtml(campaign.status)}</div>
                            <div class="muted">Spielleitung: ${escapeHtml(campaign.owner)}</div>
                            <div class="campaign-meta">
                                <div class="meta-item">
                                    <div class="meta-label">Mitglieder</div>
                                    <div class="meta-value">${campaign.member_count || 0} / ${campaign.max_players || 6}</div>
                                </div>
                                <div class="meta-item">
                                    <div class="meta-label">Sessions</div>
                                    <div class="meta-value">${campaign.session_count || 0}</div>
                                </div>
                            </div>
                            <div class="campaign-actions">
                                ${primaryAction}
                                ${campaign.is_member ? `<button class="btn btn-secondary" onclick="enterCampaign(${campaign.id})">Reingehen</button>` : ""}
                                ${campaign.is_owner ? `<button class="btn btn-danger" onclick="deleteCampaign(${campaign.id})">Loeschen</button>` : ""}
                            </div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        async function createCampaign() {
            const name = window.prompt("Name der Kampagne:");
            if (!name || !name.trim()) return;

            const description = window.prompt("Kurze Beschreibung (optional):", "") ?? "";
            const maxPlayersRaw = window.prompt("Maximale Spielerzahl (2-20):", "6");
            const maxPlayers = Number(maxPlayersRaw);

            try {
                const payload = {
                    name: name.trim(),
                    description: description.trim(),
                };
                if (Number.isInteger(maxPlayers)) {
                    payload.max_players = maxPlayers;
                }

                const created = await auth.makeAuthRequest("/api/campaigns", "POST", payload);
                showMessage("Kampagne erstellt.");
                await loadCampaigns();
                if (created && created.id) {
                    await viewCampaign(created.id);
                }
            } catch (error) {
                showMessage(error.message || "Kampagne konnte nicht erstellt werden.", true);
            }
        }

        async function joinCampaign(campaignId) {
            const token = window.prompt("Einladungs-Code fuer diese Kampagne eingeben:");
            if (!token || !token.trim()) return;

            try {
                await auth.makeAuthRequest(`/api/campaigns/${campaignId}/accept-invite`, "POST", {
                    token: token.trim()
                });
                showMessage("Du bist der Kampagne beigetreten.");
                await loadCampaigns();
                await viewCampaign(campaignId);
            } catch (error) {
                showMessage(error.message || "Beitritt fehlgeschlagen.", true);
            }
        }

        function buildMembersList(members) {
            if (!members || members.length === 0) {
                return "<div class='muted'>Noch keine Mitglieder.</div>";
            }

            return members.map(member => `
                <div class="list-item">
                    <div class="list-item-top">
                        <strong>${escapeHtml(member.username)}</strong>
                        <span>${escapeHtml(member.campaign_role)} (${escapeHtml(member.status)})</span>
                    </div>
                    <div class="muted">Beigetreten: ${formatDate(member.joined_at)}</div>
                </div>
            `).join("");
        }

        function buildSessionsList(campaign, sessions) {
            if (!sessions || sessions.length === 0) {
                return "<div class='muted'>Noch keine Session vorhanden.</div>";
            }

            const canManage = campaign.is_owner || campaign.your_role === "DM" || campaign.your_role === "CO_DM";
            return sessions.map(session => {
                const openPlayButton = `<button class="btn btn-primary btn-sm" onclick="openPlay(${campaign.id}, ${session.id})">Launch Game</button>`;
                const startButton = canManage && session.status === "scheduled"
                    ? `<button class="btn btn-primary btn-sm" onclick="startSession(${campaign.id}, ${session.id})">Session starten</button>`
                    : "";
                const endButton = canManage && session.status === "in_progress"
                    ? `<button class="btn btn-danger btn-sm" onclick="endSession(${campaign.id}, ${session.id})">Session beenden</button>`
                    : "";
                const combatStateButton = `<button class="btn btn-secondary btn-sm" onclick="viewCombatState(${campaign.id}, ${session.id})">Kampfstatus</button>`;
                const combatManageButtons = canManage && session.status === "in_progress"
                    ? `
                        <button class="btn btn-primary btn-sm" onclick="startCombat(${campaign.id}, ${session.id})">Kampf starten</button>
                        <button class="btn btn-secondary btn-sm" onclick="setCombatInitiative(${campaign.id}, ${session.id})">Initiative setzen</button>
                        <button class="btn btn-secondary btn-sm" onclick="advanceCombatTurn(${campaign.id}, ${session.id})">Naechster Zug</button>
                        <button class="btn btn-secondary btn-sm" onclick="adjustCombatHp(${campaign.id}, ${session.id})">HP aendern</button>
                        <button class="btn btn-danger btn-sm" onclick="endCombat(${campaign.id}, ${session.id})">Kampf beenden</button>
                    `
                    : "";

                return `
                    <div class="list-item">
                        <div class="list-item-top">
                            <strong>${escapeHtml(session.name)}</strong>
                            <span>${escapeHtml(session.status)}</span>
                        </div>
                        <div class="muted">Geplant: ${formatDate(session.scheduled_at)}</div>
                        <div class="muted">Gestartet: ${formatDate(session.started_at)}</div>
                        <div style="margin-top:0.5rem; display:flex; gap:0.5rem; flex-wrap:wrap;">${openPlayButton}${startButton}${endButton}${combatStateButton}</div>
                        ${combatManageButtons ? `<div style="margin-top:0.5rem; display:flex; gap:0.5rem; flex-wrap:wrap;">${combatManageButtons}</div>` : ""}
                    </div>
                `;
            }).join("");
        }

        function getLatestSession(sessions) {
            if (!sessions || sessions.length === 0) return null;
            return sessions[0];
        }

        function getLatestActiveSession(sessions) {
            return (sessions || []).find(session => session.status === "in_progress" || session.session_state === "active") || null;
        }

        function getLatestMap(maps) {
            if (!maps || maps.length === 0) return null;
            return maps[0];
        }

        function getSessionPhase(session) {
            const status = String(session?.runtime_status || session?.session_state || session?.status || "").trim().toLowerCase();
            if (status === "in_progress" || status === "active") {
                return { label: "Live", className: "state-live", tone: "live" };
            }
            if (status === "paused") {
                return { label: "Pausiert", className: "state-todo", tone: "paused" };
            }
            if (status === "ended" || status === "completed") {
                return { label: "Beendet", className: "state-done", tone: "ended" };
            }
            if (status === "ready") {
                return { label: "Bereit", className: "state-live", tone: "ready" };
            }
            return { label: "Geplant", className: "state-todo", tone: "scheduled" };
        }

        function getCampaignRoleLabel(campaign) {
            if (!campaign) return "Gast";
            if (campaign.is_owner || canModerateCampaign(campaign)) {
                return "DM";
            }
            return campaign.your_role || "Spieler";
        }

        function hubStep(title, description, done, state = "todo") {
            const stateLabel = done ? "Fertig" : "Offen";
            const stateClass = done ? "state-done" : (state === "live" ? "state-live" : "state-todo");
            return `
                <div class="hub-step">
                    <div>
                        <div class="hub-step-title">${escapeHtml(title)}</div>
                        <div class="hub-step-desc">${escapeHtml(description)}</div>
                    </div>
                    <span class="hub-step-state ${stateClass}">${stateLabel}</span>
                </div>
            `;
        }

        function buildHubChecklist(campaign, sessions, maps) {
            const canManage = canModerateCampaign(campaign);
            const latestSession = getLatestSession(sessions);
            const activeSession = getLatestActiveSession(sessions);
            const latestMap = getLatestMap(maps);
            const memberCount = Number(campaign?.member_count || 0);
            const hasMembers = memberCount > 1;
            const hasSession = !!latestSession;
            const hasMap = !!latestMap;
            const sessionLive = !!activeSession;

            if (!canManage) {
                return `
                    <div class="hub-step-list">
                        ${hubStep(
                            "Invite annehmen",
                            "Der Link oder Code muss zuerst zur Kampagne fuehren.",
                            !!campaign.is_member
                        )}
                        ${hubStep(
                            "Kampagne oeffnen",
                            "Die Detailsseite ist der Einstiegspunkt vor dem Tisch.",
                            true,
                            "live"
                        )}
                        ${hubStep(
                            "Launch Game",
                            latestSession ? `Die Session "${latestSession.name}" ist verfuegbar.` : "Warte auf die erste Session der Spielleitung.",
                            !!latestSession,
                            latestSession ? "live" : "todo"
                        )}
                        ${hubStep(
                            "Erste Aktion im Tisch",
                            "Chat senden, Token bewegen oder einfach den Tisch anschauen.",
                            sessionLive,
                            sessionLive ? "live" : "todo"
                        )}
                    </div>
                `;
            }

            return `
                <div class="hub-step-list">
                    ${hubStep(
                        "Spieler einladen",
                        hasMembers ? `${memberCount - 1} Spieler sind bereits in der Kampagne.` : "Noch keine Spieler eingeladen.",
                        hasMembers
                    )}
                    ${hubStep(
                        "Erste Karte bereitstellen",
                        hasMap ? `Zuletzt angelegte Karte: ${latestMap.name}.` : "Noch keine Karte hochgeladen.",
                        hasMap
                    )}
                    ${hubStep(
                        "Session anlegen",
                        hasSession ? `Zuletzt angelegte Session: ${latestSession.name}.` : "Noch keine Session angelegt.",
                        hasSession
                    )}
                    ${hubStep(
                        "Launch Game",
                        sessionLive ? `Die Session "${activeSession.name}" laeuft bereits.` : (latestSession ? `Die Session "${latestSession.name}" ist bereit zum Start.` : "Erst Session und Karte anlegen."),
                        sessionLive || hasSession,
                        sessionLive ? "live" : "todo"
                    )}
                </div>
            `;
        }

        function getHubPrimaryAction(campaign, sessions, maps) {
            const canManage = canModerateCampaign(campaign);
            const latestSession = getLatestSession(sessions);
            const activeSession = getLatestActiveSession(sessions);
            const latestMap = getLatestMap(maps);
            const hasMembers = Number(campaign?.member_count || 0) > 1;

            if (!campaign.is_member && !canManage) {
                return {
                    label: "Einladung eingeben",
                    hint: "Spieler sehen hier die schnellste Route in die Kampagne.",
                    action: `<button class="btn btn-primary" onclick="joinCampaign(${campaign.id})">Einladung eingeben</button>`,
                };
            }

            if (canManage) {
                if (!hasMembers) {
                    return {
                        label: "Spieler einladen",
                        hint: "Die DM-Route startet mit der ersten Einladung.",
                        action: `<button class="btn btn-primary" onclick="focusInviteControls()">Spieler einladen</button>`,
                    };
                }

                if (!latestSession) {
                    if (!latestMap) {
                        return {
                            label: "Schnellstart oeffnen",
                            hint: "Session und erste Karte werden gemeinsam vorbereitet.",
                            action: `<button class="btn btn-primary" onclick="focusQuickStart()">Karte und Session jetzt starten</button>`,
                        };
                    }
                    return {
                        label: "Session anlegen",
                        hint: "Es gibt schon eine Einladung oder Karte - jetzt fehlt nur noch die erste Session.",
                        action: `<button class="btn btn-primary" onclick="createSession(${campaign.id})">Session anlegen</button>`,
                    };
                }

                const phase = getSessionPhase(latestSession);
                if (phase.tone === "scheduled" || phase.tone === "ready") {
                    return {
                        label: "Session starten",
                        hint: `Die letzte Session "${latestSession.name}" ist vorbereitet und kann live geschaltet werden.`,
                        action: `<button class="btn btn-primary" onclick="startSession(${campaign.id}, ${latestSession.id})">Session starten</button>`,
                    };
                }

                if (phase.tone === "paused") {
                    return {
                        label: "Play oeffnen",
                        hint: `Die Session "${latestSession.name}" ist pausiert. Im Tisch kann sie weitergefuehrt werden.`,
                        action: `<button class="btn btn-primary" onclick="openPlay(${campaign.id}, ${latestSession.id})">Play oeffnen</button>`,
                    };
                }

                if (activeSession) {
                    return {
                        label: "Launch Game",
                        hint: `Die Session "${activeSession.name}" laeuft bereits im Tisch.`,
                        action: `<button class="btn btn-primary" onclick="openPlay(${campaign.id}, ${activeSession.id})">Launch Game</button>`,
                    };
                }

                return {
                    label: "Play oeffnen",
                    hint: `Die letzte Session "${latestSession.name}" ist beendet oder wartet auf eine neue Runde.`,
                    action: `<button class="btn btn-primary" onclick="openPlay(${campaign.id}, ${latestSession.id})">Play oeffnen</button>`,
                };
            }

            if (latestSession) {
                return {
                    label: "Launch Game",
                    hint: `Als Spieler gelangst du direkt in die Session "${latestSession.name}".`,
                    action: `<button class="btn btn-primary" onclick="openPlay(${campaign.id}, ${latestSession.id})">Launch Game</button>`,
                };
            }

            return {
                label: "Warte auf DM",
                hint: "Du bist Teil der Kampagne, aber noch gibt es keine Session zum Betreten.",
                action: `<button class="btn btn-secondary" disabled>Launch Game</button>`,
            };
        }

        function buildMapList(maps) {
            if (!maps || maps.length === 0) {
                return `<div class="muted">Noch keine Karte angelegt.</div>`;
            }

            return maps.map(map => `
                <div class="hub-map-item">
                    <div class="hub-map-title">${escapeHtml(map.name)}</div>
                    <div class="hub-map-meta">
                        ${escapeHtml(map.width)} x ${escapeHtml(map.height)} px · Grid ${escapeHtml(map.grid_size)} · ${escapeHtml(map.grid_type)}
                    </div>
                    ${map.description ? `<div class="muted" style="margin-top:0.35rem;">${escapeHtml(map.description)}</div>` : ""}
                </div>
            `).join("");
        }

        function focusQuickStart() {
            const field = document.getElementById("quickMapFile");
            if (!field) return;
            field.focus();
            field.scrollIntoView({ behavior: "smooth", block: "center" });
        }

        function buildRoll20CopyWorkflow(campaign, sessions, maps) {
            const latestSession = getLatestSession(sessions);
            const activeSession = getLatestActiveSession(sessions);
            const latestMap = getLatestMap(maps);
            const canManage = canModerateCampaign(campaign);
            const primaryAction = getHubPrimaryAction(campaign, sessions, maps);
            const roleLabel = getCampaignRoleLabel(campaign);
            const sessionPhase = latestSession ? getSessionPhase(latestSession) : null;

            const sessionCount = sessions ? sessions.length : 0;
            const mapCount = maps ? maps.length : 0;
            const memberCount = Number(campaign?.member_count || 0);
            const playerCount = Math.max(0, memberCount - 1);

            const statusPill = (label, value) => `<span class="hub-badge"><strong>${escapeHtml(label)}:</strong> ${escapeHtml(value)}</span>`;

            const currentSessionLabel = latestSession
                ? `${latestSession.name} · ${getSessionPhase(latestSession).label}`
                : "Noch keine Session";
            const mapLabel = latestMap
                ? `${latestMap.name} · ${latestMap.width}x${latestMap.height}`
                : "Noch keine Karte";

            const inviteControls = canManage ? `
                <div class="inline-controls">
                    <input id="inviteUsername" type="text" placeholder="Spielername">
                    <button class="btn btn-primary btn-sm" onclick="invitePlayer(${campaign.id})">Einladung erzeugen</button>
                </div>
            ` : `
                <div class="hub-callout">
                    Als Spieler kannst du hier eine Einladung eingeben, wenn du einen Code von der Spielleitung erhalten hast.
                </div>
                <div class="inline-controls">
                    <button class="btn btn-primary btn-sm" onclick="joinCampaign(${campaign.id})">Einladung eingeben</button>
                </div>
            `;

            const sessionControls = canManage ? `
                <div class="inline-controls">
                    <input id="sessionName" type="text" placeholder="Session-Name">
                    <input id="sessionSchedule" type="datetime-local" placeholder="Startzeit">
                    <input id="sessionDuration" type="number" min="30" step="30" placeholder="Dauer (min)">
                    <button class="btn btn-primary btn-sm" onclick="createSession(${campaign.id})">Session anlegen</button>
                </div>
                <div class="hub-quickstart">
                    <div class="quickstart-title">Schnellstart fuer Nicht-Techniker</div>
                    <div class="quickstart-help">Ein Klick: Session anlegen, Karte hochladen, Session starten, Play oeffnen.</div>
                    <div class="inline-controls">
                        <input id="quickSessionName" type="text" placeholder="z.B. Erste Taverne" value="Erste Session">
                        <input id="quickMapFile" type="file" accept="image/png,image/jpeg,image/webp" />
                        <button id="quickStartButton" class="btn btn-primary btn-sm" onclick="startSessionWithFirstMap(${campaign.id})">
                            Session + Karte jetzt starten
                        </button>
                    </div>
                </div>
            ` : `
                <div class="hub-callout">
                    Die DM kann hier die Session-Historie sehen und den Launch-Status verfolgen. Karten und Sessions sind nur fuer berechtigte Rollen bearbeitbar.
                </div>
            `;

            return `
                <div class="hub-shell">
                    <div class="hub-hero">
                        <div class="hub-identity">
                            <div class="hub-eyebrow">Game Details / Session Hub</div>
                            <h2>${escapeHtml(campaign.name)}</h2>
                            <div class="hub-pill-row">
                                ${statusPill("Rolle", roleLabel)}
                                ${statusPill("Kampagne", campaign.status)}
                                ${statusPill("Mitglieder", `${memberCount}`)}
                                ${statusPill("Spieler", `${playerCount}`)}
                                ${statusPill("Sessions", `${sessionCount}`)}
                                ${statusPill("Karten", `${mapCount}`)}
                            </div>
                            <div class="hub-summary">
                                ${escapeHtml(campaign.description || "Keine Beschreibung vorhanden.")}
                            </div>
                            <div class="hub-badges">
                                <span class="hub-badge">My Games</span>
                                <span class="hub-badge">Game Details</span>
                                <span class="hub-badge">Invite Players</span>
                                <span class="hub-badge">Launch Game</span>
                            </div>
                        </div>

                        <div class="hub-primary">
                            <div>
                                <div class="hub-next-label">Naechster Schritt</div>
                                <div class="hub-next-title">${escapeHtml(primaryAction.label)}</div>
                                <div class="hub-next-hint">${escapeHtml(primaryAction.hint)}</div>
                            </div>
                            <div class="hub-primary-actions">
                                ${primaryAction.action}
                                ${canManage ? `<button class="btn btn-secondary" onclick="focusInviteControls()">Invite Players</button>` : ""}
                                ${canManage && !latestSession ? `<button class="btn btn-secondary" onclick="focusQuickStart()">Erste Karte laden</button>` : ""}
                            </div>
                        </div>
                    </div>

                    <div class="hub-grid">
                        <div class="hub-card">
                            <div class="hub-card-topline">
                                <h3>Game Details</h3>
                                <span class="hub-pill">${escapeHtml(roleLabel)}</span>
                            </div>
                            <div class="hub-stat-row">
                                <div class="hub-stat">
                                    <div class="hub-stat-label">Kampagnenstatus</div>
                                    <div class="hub-stat-value">${escapeHtml(campaign.status)}</div>
                                </div>

        function formatBytes(bytes) {
            const value = Number(bytes || 0);
            if (!Number.isFinite(value) || value <= 0) return "0 B";
            const units = ["B", "KB", "MB", "GB"];
            let current = value;
            let unitIndex = 0;
            while (current >= 1024 && unitIndex < units.length - 1) {
                current /= 1024;
                unitIndex += 1;
            }
            return `${current.toFixed(current >= 10 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
        }

        function getAssetTypeLabel(assetType) {
            const labels = {
                map: "Karte",
                token: "Token",
                handout: "Handout",
                image: "Bild",
            };
            return labels[String(assetType || "").toLowerCase()] || String(assetType || "Asset");
        }

        function getAssetScopeLabel(asset) {
            if (asset?.scope_label) return asset.scope_label;
            return asset?.session_id ? "Session" : "Campaign";
        }

        function getAssetPreviewMarkup(asset) {
            const assetType = String(asset?.asset_type || "").toLowerCase();
            const mimeType = String(asset?.mime_type || "").toLowerCase();
            const label = getAssetTypeLabel(assetType);

            if (asset?.previewable && mimeType.startsWith("image/")) {
                return `<img src="${asset.preview_url}" alt="${escapeHtml(asset.filename || label)}">`;
            }

            if (asset?.previewable && mimeType === "application/pdf") {
                return `
                    <div class="asset-preview-placeholder">PDF</div>
                    <div class="asset-preview-label">Inline-Vorschau</div>
                `;
            }

            const fallback = {
                map: "MAP",
                token: "TOK",
                handout: "DOC",
                image: "IMG",
            }[assetType] || "ASSET";

            return `
                <div class="asset-preview-placeholder">${fallback}</div>
                <div class="asset-preview-label">${escapeHtml(label)}</div>
            `;
        }

                { label: "Session", value: stats?.session_assets ?? 0 },

                { label: "Handouts", value: stats?.handouts ?? 0 },

                { label: "Gesamt", value: formatBytes(stats?.total_size_bytes ?? 0) },

            ];

            return items.map(item => `

        function renderAssetLibrary(payload, campaignId) {

            grid.innerHTML = assets.map(asset => {
                const previewUrl = asset.preview_url || `/api/assets/${asset.id}/preview`;
                const downloadUrl = asset.download_url || `/api/assets/${asset.id}/download`;
                const canPreview = !!asset.previewable;
                const sessionMeta = asset.session_name
                    ? `<div class="asset-card-meta">Session: ${escapeHtml(asset.session_name)}</div>`
                    : "";
                const deleteButton = canManage
                    ? `<button class="btn btn-danger btn-sm" onclick="deleteLibraryAsset(${asset.id}, ${campaignId})">Loeschen</button>`
                    : "";
                const previewButton = canPreview
                    ? `<button class="btn btn-secondary btn-sm" onclick="openAssetPreview('${previewUrl.replace(/'/g, "\\'")}')">Preview</button>`
                    : "";

        function syncAssetLibraryUploadScope() {
            const scope = document.getElementById("assetLibraryUploadScope");
            const sessionSelect = document.getElementById("assetLibraryUploadSession");
            if (!scope || !sessionSelect) return;

            const isSessionScope = scope.value === "session";
            sessionSelect.disabled = !isSessionScope;
            sessionSelect.style.opacity = isSessionScope ? "1" : "0.55";
        }

        function resetAssetLibraryUpload() {
            const file = document.getElementById("assetLibraryFile");
            const type = document.getElementById("assetLibraryUploadType");
            const scope = document.getElementById("assetLibraryUploadScope");
            const session = document.getElementById("assetLibraryUploadSession");
            if (file) file.value = "";
            if (type) type.value = "image";
            if (scope) scope.value = "campaign";
            if (session) session.value = "";

        async function loadAssetLibrary(campaignId) {
            const search = document.getElementById("assetLibrarySearch")?.value?.trim() || "";
            const assetType = document.getElementById("assetLibraryTypeFilter")?.value || "";
            const scope = document.getElementById("assetLibraryScopeFilter")?.value || "all";
            const sessionId = document.getElementById("assetLibrarySessionFilter")?.value || "";

            const params = new URLSearchParams();
            if (search) params.set("query", search);
            if (assetType) params.set("asset_type", assetType);
            if (scope) params.set("scope", scope);
            if (sessionId) params.set("session_id", sessionId);
            params.set("per_page", "48");

            const grid = document.getElementById("assetLibraryGrid");
            if (grid) {
                grid.innerHTML = `<div class="asset-empty-state">Bibliothek wird geladen...</div>`;
            }

            try {
                const payload = await auth.makeAuthRequest(`/api/assets/campaigns/${campaignId}/library?${params.toString()}`);
                renderAssetLibrary(payload, campaignId);
                syncAssetLibraryUploadScope();
            } catch (error) {
                if (grid) {
                    grid.innerHTML = `<div class="asset-empty-state">Bibliothek konnte nicht geladen werden.</div>`;
                }
                showMessage(error.message || "Asset-Library konnte nicht geladen werden.", true);
            }
        }

        async function uploadLibraryAsset(campaignId) {
            const fileInput = document.getElementById("assetLibraryFile");
            const typeField = document.getElementById("assetLibraryUploadType");
            const scopeField = document.getElementById("assetLibraryUploadScope");
            const sessionField = document.getElementById("assetLibraryUploadSession");
            if (!fileInput || !fileInput.files || !fileInput.files[0]) {
                showMessage("Bitte zuerst eine Datei auswaehlen.", true);
                return;
            }

            const file = fileInput.files[0];
            const assetType = typeField?.value || "image";
            const scope = scopeField?.value || "campaign";
            const sessionId = sessionField?.value || "";

            if (scope === "session" && !sessionId) {
                showMessage("Bitte zuerst eine Session fuer den Upload waehlen.", true);
                return;
            }

            const button = document.querySelector('.asset-library-upload .btn.btn-primary');
            if (button) {
                button.disabled = true;
                button.textContent = "Upload...";
            }

            const formData = new FormData();
            formData.append("file", file);
            formData.append("asset_type", assetType);

            const endpoint = scope === "session"
                ? `/api/sessions/${sessionId}/assets/upload`
                : `/api/assets/campaigns/${campaignId}/upload`;

            try {
                const headers = Auth.buildHeaders("POST", false);
                const response = await fetch(endpoint, {
                    method: "POST",
                    credentials: "include",
                    headers,
                    body: formData,
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error || "Upload failed");
                }

                resetAssetLibraryUpload();
                showMessage("Asset hochgeladen.");
                await viewCampaign(campaignId, false);
            } catch (error) {
                showMessage(error.message || "Asset konnte nicht hochgeladen werden.", true);
            } finally {
                if (button) {
                    button.disabled = false;
                    button.textContent = "Upload";
                }
            }
        }

            try {

                showMessage("Asset geloescht.");
                await viewCampaign(campaignId, false);

        function renderChatMessages(messages, campaignId, sessionId) {
            const feed = document.getElementById("communityChatFeed");

                feed.className = "chat-feed muted";

                const canDelete = canModerate || message.author_user_id === currentUser?.id;
                const reportButton = `<button class="btn btn-secondary btn-sm" onclick="reportCommunityMessage(${campaignId}, ${sessionId}, ${message.id})">Report</button>`;
                const deleteButton = canDelete
                    ? `<button class="btn btn-danger btn-sm" onclick="deleteCommunityMessage(${campaignId}, ${sessionId}, ${message.id})">Delete</button>`
                    : "";

                return `
                    <div class="chat-item">
                        <div class="chat-item-top">
                            <strong>${escapeHtml(message.author_username || `User #${message.author_user_id}`)}</strong>
                            <span class="muted">${formatDate(message.created_at)}</span>
                        </div>
                        <div>${escapeHtml(message.content || "")}</div>
                        <div class="chat-actions" style="margin-top:0.35rem;">
                            ${reportButton}
                            ${deleteButton}

                    </div>

            }).join("");
