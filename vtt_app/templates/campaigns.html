        async function loadCommunityPanel(campaignId) {
            const sessionSelect = document.getElementById("communitySessionSelect");
            if (!sessionSelect) return;

            const sessionId = Number(sessionSelect.value);
            if (!Number.isInteger(sessionId) || sessionId <= 0) return;

            try {
                const [chatPayload, voicePayload] = await Promise.all([
                    community.loadMessages(campaignId, sessionId, { limit: 50 }),
                    community.getVoiceConfig(campaignId, sessionId),
                ]);
                renderChatMessages(chatPayload.messages || [], campaignId, sessionId);

                const voiceBox = document.getElementById("communityVoice");
                if (voiceBox) {
                    voiceBox.textContent = `Voice: ${voicePayload.voice_enabled ? "aktiv" : "deaktiviert (M7.1)"}`;
                }
            } catch (error) {
                showMessage(error.message || "Community-Bereich konnte nicht geladen werden.", true);
            }
        }

        async function sendCommunityMessage(campaignId) {
            const input = document.getElementById("communityMessageInput");
            const sessionSelect = document.getElementById("communitySessionSelect");
            if (!input || !sessionSelect) return;

            const content = input.value.trim();
            if (!content) return;
            const sessionId = Number(sessionSelect.value);

            try {
                await community.sendMessage(campaignId, sessionId, content);
                input.value = "";
                await loadCommunityPanel(campaignId);
            } catch (error) {
                showMessage(error.message || "Nachricht konnte nicht gesendet werden.", true);
            }
        }

        async function reportCommunityMessage(campaignId, sessionId, messageId) {
            const reason = (window.prompt("Meldegrund: spam, abuse, harassment, other", "abuse") || "").trim().toLowerCase();
            if (!reason) return;
            const note = window.prompt("Zusatzinfo (optional):", "") || "";
            try {
                await community.reportMessage(campaignId, sessionId, messageId, reason, note);
                showMessage("Meldung gesendet.");
            } catch (error) {
                showMessage(error.message || "Meldung fehlgeschlagen.", true);
            }
        }

        async function deleteCommunityMessage(campaignId, sessionId, messageId) {
            if (!window.confirm("Nachricht wirklich loeschen?")) return;
            try {
                await community.deleteMessage(campaignId, sessionId, messageId);
                await loadCommunityPanel(campaignId);
                showMessage("Nachricht geloescht.");
            } catch (error) {
                showMessage(error.message || "Loeschen fehlgeschlagen.", true);
            }
        }

        async function loadModerationQueue(campaignId) {
            const queue = document.getElementById("modQueue");
            if (!queue) return;
            try {
                const payload = await community.loadReports(campaignId, { limit: 25 });
                const reports = payload.reports || [];
                if (!reports.length) {
                    queue.className = "mod-queue muted";
                    queue.textContent = "Keine offenen Meldungen.";
                    return;
                }

                queue.className = "mod-queue";
                queue.innerHTML = reports.map(report => `
                    <div class="mod-item">
                        <div><strong>#${report.id}</strong> ${escapeHtml(report.reason_code)} | ${escapeHtml(report.status)}</div>
                        <div class="muted">Reporter: ${escapeHtml(report.reporter_username || String(report.reporter_user_id))}</div>
                        <div class="muted">Target user: ${escapeHtml(report.target_username || String(report.target_user_id || "-"))}</div>
                        <div class="muted">Target msg: ${escapeHtml(String(report.target_message_id || "-"))}</div>
                    </div>
                `).join("");
            } catch (error) {
                showMessage(error.message || "Moderations-Queue konnte nicht geladen werden.", true);
            }
        }

        async function applyModerationActionFromUI(campaignId) {
            const actionType = document.getElementById("modActionType")?.value;
            const subjectUserId = document.getElementById("modTargetUserId")?.value;
            const subjectMessageId = document.getElementById("modTargetMessageId")?.value;
            const reason = document.getElementById("modReason")?.value;
            const duration = document.getElementById("modDuration")?.value;

            const payload = { action_type: actionType };
            if (subjectUserId) payload.subject_user_id = Number(subjectUserId);
            if (subjectMessageId) payload.subject_message_id = Number(subjectMessageId);
            if (reason) payload.reason = reason;
            if (duration) payload.duration_minutes = Number(duration);

            try {
                await community.createModerationAction(campaignId, payload);
                showMessage("Moderationsaktion ausgefuehrt.");
                await loadModerationQueue(campaignId);
                await loadCommunityPanel(campaignId);
            } catch (error) {
                showMessage(error.message || "Moderationsaktion fehlgeschlagen.", true);
            }
        }

        async function revokeModerationActionFromUI(campaignId) {
            const actionIdRaw = document.getElementById("modRevokeActionId")?.value;
            if (!actionIdRaw) {
                showMessage("Bitte action_id zum Widerruf eingeben.", true);
                return;
            }

            try {
                await community.revokeModerationAction(campaignId, Number(actionIdRaw));
                showMessage("Aktion widerrufen.");
                await loadModerationQueue(campaignId);
            } catch (error) {
                showMessage(error.message || "Widerruf fehlgeschlagen.", true);
            }
        }

        async function viewCampaign(campaignId, pushHistory = true) {
            try {
                const data = await auth.makeAuthRequest(`/api/campaigns/${campaignId}`);
                selectedCampaignId = campaignId;
                renderCampaignDetail(data);
                if (pushHistory) {
                    updateUrlCampaignId(campaignId);
                }
            } catch (error) {
                showMessage(error.message || "Kampagnen-Details konnten nicht geladen werden.", true);
            }
        }

        function renderCampaignDetail(data) {
            const detail = document.getElementById("campaignDetail");
            const detailBody = document.getElementById("detailBody");
            const campaign = data.campaign;
            const members = data.members || [];
            const sessions = data.sessions || [];
            const maps = data.maps || [];
            const canManage = campaign.is_owner || campaign.your_role === "DM" || campaign.your_role === "CO_DM";
            currentDetailCampaign = campaign;

            document.getElementById("detailTitle").textContent = campaign.name;
            document.getElementById("refreshDetailBtn").onclick = () => viewCampaign(campaign.id, false);

            detailBody.innerHTML = `
                ${buildRoll20CopyWorkflow(campaign, sessions, maps)}
                ${buildAssetLibraryPanel(campaign, sessions, canManage)}
                <div class="detail-box" style="margin-top:1rem;">
                    <h3>Mitglieder</h3>
                    <div class="list">${buildMembersList(members)}</div>
                </div>
                ${buildCommunityPanel(campaign, sessions)}
            `;

            detail.classList.remove("hidden");
            if (sessions.length > 0) {
                loadCommunityPanel(campaign.id);
                if (canModerateCampaign(campaign)) {
                    loadModerationQueue(campaign.id);
                }
            }
            loadAssetLibrary(campaign.id);
            detail.scrollIntoView({ behavior: "smooth", block: "start" });
        }

        function closeCampaignDetail() {
            selectedCampaignId = null;
            currentDetailCampaign = null;
            document.getElementById("campaignDetail").classList.add("hidden");
            updateUrlCampaignId(null);
        }

        async function invitePlayer(campaignId) {
            const usernameField = document.getElementById("inviteUsername");
            const playerUsername = usernameField ? usernameField.value.trim() : "";
            if (!playerUsername) {
                showMessage("Bitte zuerst einen Spielernamen eingeben.", true);
                return;
            }

            try {
                const invite = await auth.makeAuthRequest(`/api/campaigns/${campaignId}/invite`, "POST", {
                    player_username: playerUsername
                });
                if (usernameField) usernameField.value = "";
                showMessage("Einladungs-Code erzeugt.");
                window.prompt("Code zum Teilen:", invite.invite_token);
                await viewCampaign(campaignId, false);
            } catch (error) {
                showMessage(error.message || "Einladung fehlgeschlagen.", true);
            }
        }

        function focusInviteControls() {
            const field = document.getElementById("inviteUsername");
            if (!field) return;
            field.focus();
            field.scrollIntoView({ behavior: "smooth", block: "center" });
        }

        async function createSession(campaignId) {
            const nameField = document.getElementById("sessionName");
            const scheduleField = document.getElementById("sessionSchedule");
            const durationField = document.getElementById("sessionDuration");

            const name = nameField ? nameField.value.trim() : "";
            if (!name) {
                showMessage("Bitte einen Session-Namen eingeben.", true);
                return;
            }

            const payload = { name };
            if (scheduleField && scheduleField.value) {
                payload.scheduled_at = new Date(scheduleField.value).toISOString();
            }
            if (durationField && durationField.value) {
                payload.duration_minutes = Number(durationField.value);
            }

            try {
                await auth.makeAuthRequest(`/api/campaigns/${campaignId}/sessions`, "POST", payload);
                if (nameField) nameField.value = "";
                if (scheduleField) scheduleField.value = "";
                if (durationField) durationField.value = "";
                showMessage("Session angelegt.");
                await viewCampaign(campaignId, false);
                await loadCampaigns();
            } catch (error) {
                showMessage(error.message || "Session konnte nicht angelegt werden.", true);
            }
        }

        async function makeMultipartAuthRequest(url, formData, retryOn401 = true) {
            const headers = Auth.buildHeaders("POST", false);
            const options = {
                method: "POST",
                credentials: "include",
                headers,
                body: formData,
            };

            let response = await fetch(url, options);
            if (response.status === 401 && retryOn401) {
                const refreshed = await Auth.refreshAccessToken();
                if (refreshed) {
                    return makeMultipartAuthRequest(url, formData, false);
                }
                window.location.href = "/login.html";
                return null;
            }

            if (!response.ok) {
                const error = await response.json().catch(() => ({}));
                throw new Error(error.error || "Upload failed");
            }

            return response.json();
        }

        async function getImageSize(file) {
            return new Promise((resolve, reject) => {
                const objectUrl = URL.createObjectURL(file);
                const image = new Image();
                image.onload = () => {
                    const size = { width: image.naturalWidth, height: image.naturalHeight };
                    URL.revokeObjectURL(objectUrl);
                    resolve(size);
                };
                image.onerror = () => {
                    URL.revokeObjectURL(objectUrl);
                    reject(new Error("Could not read image dimensions"));
                };
                image.src = objectUrl;
            });
        }

        async function startSessionWithFirstMap(campaignId) {
            const nameField = document.getElementById("quickSessionName");
            const mapField = document.getElementById("quickMapFile");
            const button = document.getElementById("quickStartButton");

            const sessionName = (nameField?.value || "").trim() || "Erste Session";
            const file = mapField?.files?.[0];

            if (!file) {
                showMessage("Bitte zuerst eine PNG/JPEG/WebP Karte auswaehlen.", true);
                return;
            }
            if (!["image/png", "image/jpeg", "image/webp"].includes(file.type)) {
                showMessage("Bitte nur PNG, JPEG oder WebP verwenden.", true);
                return;
            }
            if (file.size > 50 * 1024 * 1024) {
                showMessage("Datei ist zu gross. Maximum sind 50MB.", true);
                return;
            }

            if (button) {
                button.disabled = true;
                button.textContent = "Bitte warten...";
            }

            try {
                showMessage("Schritt 1/4: Session wird erstellt...");
                const createdSession = await auth.makeAuthRequest(`/api/campaigns/${campaignId}/sessions`, "POST", {
                    name: sessionName,
                    duration_minutes: 180
                });

                showMessage("Schritt 2/4: Karte wird hochgeladen...");
                const formData = new FormData();
                formData.append("file", file);
                formData.append("asset_type", "map");
                const uploaded = await makeMultipartAuthRequest(`/api/assets/campaigns/${campaignId}/upload`, formData);

                let size = { width: 1400, height: 900 };
                try {
                    size = await getImageSize(file);
                } catch (_error) {
                    // Fallback to sensible defaults for first-run simplicity.
                }

                showMessage("Schritt 3/4: Karte wird als Session-Layer gesetzt...");
                await auth.makeAuthRequest(`/api/sessions/${createdSession.id}/map-layers`, "POST", {
                    layer_name: "Hauptkarte",
                    asset_id: uploaded.asset_id,
                    width: size.width,
                    height: size.height,
                    grid_size: 70,
                    is_visible: true,
                    fog_of_war_enabled: false
                });

                showMessage("Schritt 4/4: Session wird gestartet...");
                await auth.makeAuthRequest(`/api/sessions/${createdSession.id}/start`, "POST");

                if (mapField) mapField.value = "";
                showMessage("Fertig. Session ist live und Karte ist geladen.");
                await viewCampaign(campaignId, false);
                await loadCampaigns();
                openPlay(campaignId, createdSession.id);
            } catch (error) {
                showMessage(error.message || "Schnellstart fehlgeschlagen.", true);
            } finally {
                if (button) {
                    button.disabled = false;
                    button.textContent = "Session + Karte jetzt starten";
                }
            }
        }

        async function startSession(campaignId, sessionId) {
            try {
                await auth.makeAuthRequest(`/api/sessions/${sessionId}/start`, "POST");
                showMessage("Session gestartet.");
                await viewCampaign(campaignId, false);
                await loadCampaigns();
            } catch (error) {
                showMessage(error.message || "Session konnte nicht gestartet werden.", true);
            }
        }

        async function endSession(campaignId, sessionId) {
            const ok = window.confirm(
                "Session wirklich beenden?\n\nHinweis: Danach ist die Session nicht mehr live."
            );
            if (!ok) return;
            try {
                await auth.makeAuthRequest(`/api/sessions/${sessionId}/end`, "POST");
                showMessage("Session beendet.");
                await viewCampaign(campaignId, false);
                await loadCampaigns();
            } catch (error) {
                showMessage(error.message || "Session konnte nicht beendet werden.", true);
            }
        }

        function summarizeCombatState(payload) {
            const encounter = payload?.encounter;
            if (!encounter) return "Noch kein Kampf gestartet.";
            const participants = payload?.participants || [];
            const activeToken = participants.find(token => token.id === encounter.active_token_id);
            const activeName = activeToken ? activeToken.name : "none";
            return `Kampf #${encounter.id} | Status: ${encounter.status} | Runde: ${encounter.round_number} | Aktiv: ${activeName} | Version: ${encounter.version}`;
        }

        async function fetchCombatState(campaignId, sessionId) {
            return auth.makeAuthRequest(`/api/campaigns/${campaignId}/sessions/${sessionId}/combat/state`);
        }

        async function viewCombatState(campaignId, sessionId) {
            try {
                const payload = await fetchCombatState(campaignId, sessionId);
                const summary = summarizeCombatState(payload);
                showMessage(summary);
            } catch (error) {
                showMessage(error.message || "Kampfstatus konnte nicht geladen werden.", true);
            }
        }

        async function startCombat(campaignId, sessionId) {
            const mode = (window.prompt("Kampfmodus? auto oder manual", "auto") || "auto").trim().toLowerCase();
            if (!mode) return;
            if (mode !== "auto" && mode !== "manual") {
                showMessage("Kampfmodus muss auto oder manual sein.", true);
                return;
            }

            try {
                const payload = await auth.makeAuthRequest(
                    `/api/campaigns/${campaignId}/sessions/${sessionId}/combat/start`,
                    "POST",
                    { mode }
                );
                showMessage(`Kampf gestartet. ${summarizeCombatState(payload)}`);
                if (selectedCampaignId === campaignId) {
                    await viewCampaign(campaignId, false);
                }
            } catch (error) {
                showMessage(error.message || "Kampf konnte nicht gestartet werden.", true);
            }
        }

        async function setCombatInitiative(campaignId, sessionId) {
            try {
                const state = await fetchCombatState(campaignId, sessionId);
                if (!state.encounter) {
                    showMessage("Kein aktiver Kampf fuer Initiative vorhanden.", true);
                    return;
                }

                const raw = window.prompt("Initiative als token_id:wert, z.B. 3:17,4:12");
                if (!raw || !raw.trim()) return;

                const entries = raw.split(",").map(chunk => chunk.trim()).filter(Boolean).map(chunk => {
                    const parts = chunk.split(":");
                    return {
                        token_id: Number(parts[0]),
                        initiative: Number(parts[1])
                    };
                });

                if (!entries.length || entries.some(entry => !Number.isInteger(entry.token_id) || !Number.isInteger(entry.initiative))) {
                    showMessage("Initiative-Format ist ungueltig.", true);
                    return;
                }

                const payload = await auth.makeAuthRequest(
                    `/api/campaigns/${campaignId}/sessions/${sessionId}/combat/initiative`,
                    "POST",
                    {
                        base_version: state.encounter.version,
                        entries
                    }
                );
                showMessage(`Initiative aktualisiert. ${summarizeCombatState(payload)}`);
            } catch (error) {
                showMessage(error.message || "Initiative konnte nicht gesetzt werden.", true);
            }
        }

        async function advanceCombatTurn(campaignId, sessionId) {
            try {
                const state = await fetchCombatState(campaignId, sessionId);
                if (!state.encounter) {
                    showMessage("Kein aktiver Kampf vorhanden.", true);
                    return;
                }

                const payload = await auth.makeAuthRequest(
                    `/api/campaigns/${campaignId}/sessions/${sessionId}/combat/turn/advance`,
                    "POST",
                    {
                        base_version: state.encounter.version
                    }
                );
                showMessage(`Zug weitergeschaltet. ${summarizeCombatState(payload)}`);
            } catch (error) {
                showMessage(error.message || "Naechster Zug fehlgeschlagen.", true);
            }
        }

        async function adjustCombatHp(campaignId, sessionId) {
            try {
                const state = await fetchCombatState(campaignId, sessionId);
                if (!state.encounter) {
                    showMessage("Kein aktiver Kampf vorhanden.", true);
                    return;
                }

                const tokenIdRaw = window.prompt("Ziel-Token-ID:");
                if (!tokenIdRaw) return;
                const tokenId = Number(tokenIdRaw);
                if (!Number.isInteger(tokenId)) {
                    showMessage("Token-ID muss eine Zahl sein.", true);
                    return;
                }

                const deltaRaw = window.prompt("HP-Differenz (minus = Schaden, plus = Heilung):", "-5");
                if (!deltaRaw) return;
                const delta = Number(deltaRaw);
                if (!Number.isInteger(delta)) {
                    showMessage("HP-Wert muss eine Zahl sein.", true);
                    return;
                }

                const reason = window.prompt("Grund (optional):", "") || null;
                const payload = await auth.makeAuthRequest(
                    `/api/campaigns/${campaignId}/sessions/${sessionId}/combat/hp-adjust`,
                    "POST",
                    {
                        base_version: state.encounter.version,
                        target_token_id: tokenId,
                        delta,
                        reason
                    }
                );
                showMessage(`HP aktualisiert. ${summarizeCombatState(payload)}`);
            } catch (error) {
                showMessage(error.message || "HP-Aenderung fehlgeschlagen.", true);
            }
        }

        async function endCombat(campaignId, sessionId) {
            if (!window.confirm("Aktuellen Kampf wirklich beenden?")) return;
            try {
                const state = await fetchCombatState(campaignId, sessionId);
                if (!state.encounter) {
                    showMessage("Kein aktiver Kampf vorhanden.", true);
                    return;
                }

                const payload = await auth.makeAuthRequest(
                    `/api/campaigns/${campaignId}/sessions/${sessionId}/combat/end`,
                    "POST",
                    {
                        base_version: state.encounter.version
                    }
                );
                showMessage(`Kampf beendet. ${summarizeCombatState(payload)}`);
            } catch (error) {
                showMessage(error.message || "Kampf konnte nicht beendet werden.", true);
            }
        }

        async function deleteCampaign(campaignId) {
            if (!window.confirm("Kampagne wirklich loeschen?")) return;

            try {
                await auth.makeAuthRequest(`/api/campaigns/${campaignId}`, "DELETE");
                if (selectedCampaignId === campaignId) {
                    closeCampaignDetail();
                }
                showMessage("Kampagne geloescht.");
                await loadCampaigns();
            } catch (error) {
                showMessage(error.message || "Kampagne konnte nicht geloescht werden.", true);
            }
        }

        function enterCampaign(campaignId) {
            window.location.href = `/campaigns?campaign_id=${campaignId}`;
        }

        function openPlay(campaignId, sessionId) {
            window.location.href = `/play?campaign_id=${campaignId}&session_id=${sessionId}`;
        }

        function goTo(path) {
            if (window.BookScene && window.BookScene.isOpened) {
                BookScene.pageTurn(path);
            } else {
                window.location.href = path;
            }
        }

        async function logout() {
            await auth.logout();
        }

        loadCampaigns();

        // Add page numbers for desktop view (2-page spread)
        if (window.BookScene) {
            BookScene.addPageNumbers('3–4');
        }
    </script>

    <!-- Book Animation on Page Load -->
    <script src="/static/js/book-animation.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.animateBookOpen) {
                window.animateBookOpen({ duration: 1500, particleCount: 8 });
            }
        });
    </script>
