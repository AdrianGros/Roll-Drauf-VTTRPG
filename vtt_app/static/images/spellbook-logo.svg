<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .book-spine { fill: #4a235a; }
      .book-cover { fill: #5a3a6a; }
      .book-edge { fill: #8b5a8f; }
      .book-accent { fill: #d4af37; }
      .sparkle { fill: #d4af37; opacity: 0.8; }
      @keyframes twinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      .sparkle { animation: twinkle 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f5e6d3" stroke="#d4af37" stroke-width="2"/>

  <!-- Left book cover -->
  <rect class="book-cover" x="30" y="60" width="65" height="80" rx="4"/>

  <!-- Right book cover -->
  <rect class="book-cover" x="105" y="60" width="65" height="80" rx="4"/>

  <!-- Spine -->
  <rect class="book-spine" x="95" y="60" width="10" height="80"/>

  <!-- Left cover accent -->
  <rect class="book-accent" x="32" y="62" width="61" height="3"/>
  <rect class="book-accent" x="32" y="135" width="61" height="3"/>

  <!-- Right cover accent -->
  <rect class="book-accent" x="107" y="62" width="61" height="3"/>
  <rect class="book-accent" x="107" y="135" width="61" height="3"/>

  <!-- Book pages (inside effect) -->
  <path d="M 35 65 L 95 68 L 95 145 L 35 142 Z" fill="rgba(245, 230, 211, 0.4)" stroke="#d4af37" stroke-width="1"/>
  <path d="M 105 65 L 165 68 L 165 145 L 105 142 Z" fill="rgba(245, 230, 211, 0.4)" stroke="#d4af37" stroke-width="1"/>

  <!-- Left page lines (text effect) -->
  <line x1="40" y1="80" x2="85" y2="81" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="90" x2="85" y2="91" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="100" x2="85" y2="101" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="110" x2="85" y2="111" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="120" x2="85" y2="121" stroke="#d4af37" stroke-width="1" opacity="0.5"/>

  <!-- Right page lines (text effect) -->
  <line x1="110" y1="80" x2="160" y2="81" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="90" x2="160" y2="91" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="100" x2="160" y2="101" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="110" x2="160" y2="111" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <line x1="110" y1="120" x2="160" y2="121" stroke="#d4af37" stroke-width="1" opacity="0.5"/>

  <!-- Sparkles -->
  <circle class="sparkle" cx="25" cy="45" r="3"/>
  <circle class="sparkle" cx="175" cy="55" r="2.5"/>
  <circle class="sparkle" cx="60" cy="35" r="2"/>
  <circle class="sparkle" cx="140" cy="150" r="2.5"/>
  <circle class="sparkle" cx="180" cy="120" r="2"/>

  <!-- Shine effect on book -->
  <ellipse cx="70" cy="75" rx="15" ry="25" fill="white" opacity="0.15"/>
  <ellipse cx="135" cy="75" rx="15" ry="25" fill="white" opacity="0.15"/>
</svg>
