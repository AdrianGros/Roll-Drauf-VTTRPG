<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>roll drauf vtt</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #e0e0e0; }
        .game-board { display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        .map-container { flex: 1; display: flex; flex-direction: column; padding: 10px; background: #2d2d2d; }
        canvas { flex: 1; background: #f0f0f0; cursor: grab; border: 2px solid #444; border-radius: 4px; display: block; }
        canvas:active { cursor: grabbing; }
        .sidebar { width: 300px; background: #252525; border-left: 1px solid #444; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; }
        .sidebar h3 { font-size: 14px; text-transform: uppercase; margin-bottom: 10px; color: #888; letter-spacing: 1px; }
        .dice-roller { background: #333; padding: 15px; border-radius: 4px; margin-bottom: 15px; }
        .dice-input { width: 100%; padding: 8px; background: #1e1e1e; border: 1px solid #444; color: #e0e0e0; border-radius: 4px; font-size: 14px; margin-bottom: 8px; font-family: monospace; }
        .dice-button { width: 100%; padding: 8px; background: #4caf50; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .dice-button:hover { background: #45a049; }
        .dice-result { background: #2d2d2d; border: 1px solid #4caf50; padding: 10px; margin-top: 8px; border-radius: 4px; font-family: monospace; font-size: 12px; }
        .connection-status { position: absolute; top: 10px; right: 10px; padding: 8px 12px; background: #4caf50; color: white; border-radius: 4px; font-size: 12px; z-index: 100; }
        .connection-status.disconnected { background: #ff6b6b; }
        .zoom-controls { display: flex; gap: 5px; margin-bottom: 10px; }
        .zoom-btn { padding: 6px 12px; background: #333; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .zoom-btn:hover { background: #444; }
    </style>
</head>
<body>
    <div class="game-board">
        <div class="map-container">
            <div class="zoom-controls">
                <button class="zoom-btn">??+</button>
                <button class="zoom-btn">??-</button>
                <button class="zoom-btn">Reset</button>
            </div>
            <canvas id="game-canvas"></canvas>
            <div class="connection-status" id="connection-status">?? Verbinde...</div>
        </div>
        <div class="sidebar">
            <h3>?? Würfelwerfer</h3>
            <div class="dice-roller">
                <input type="text" id="dice-input" class="dice-input" placeholder="z.B. 1d20+5" />
                <button id="dice-button" class="dice-button">Wurf</button>
                <div id="dice-result" class="dice-result"></div>
            </div>
        </div>
    </div>
    <script src="/src/main.js"></script>
</body>
</html>
